          - text: on redRail.
        - list [ref=e134]:
          - listitem [level=1] [ref=e135]:
            - strong [ref=e136]: An authorised partner of IRCTC-
            - text: redRail is an authorised IRCTC partner, providing authentic information.
          - listitem [level=1] [ref=e137]:
            - strong [ref=e138]: Free cancellation-
            - text: Get the freedom to cancel train tickets without paying cancellation charges.
          - listitem [level=1] [ref=e139]:
            - strong [ref=e140]: Alternate Trip-
            - text: Waitlist train ticket will get confirmed, or you will get a 3X refund to book an alternate train or bus.
          - listitem [level=1] [ref=e141]:
            - strong [ref=e142]: 24/7 customer support-
            - text: Customer support for redRail is available 24/7 to help you with train bookings.
        - heading "How to Book Bus Tickets and Train Tickets Online on redBus?" [level=2] [ref=e143]
        - paragraph [ref=e144]: Below are some simple steps that you can follow when booking train or bus tickets online on redBus.
        - list [ref=e145]:
          - listitem [level=1] [ref=e146]:
            - strong [ref=e147]: "Step 1:"
            - text: Visit the redBus website or app.
          - listitem [level=1] [ref=e148]:
            - strong [ref=e149]: "Step 2:"
            - text: Select your preferred mode of transport, either bus or train.
          - listitem [level=1] [ref=e150]:
            - strong [ref=e151]: "Step 3:"
            - text: Select your travel date and journey details.
          - listitem [level=1] [ref=e152]:
            - strong [ref=e153]: Step 4
            - text: ": Search for your preferred bus or train available on your chosen travel date and route."
          - listitem [level=1] [ref=e154]:
            - strong [ref=e155]: "Step 5:"
            - text: Select your preferred boarding or dropping points and enter your contact details.
          - listitem [level=1] [ref=e156]:
            - strong [ref=e157]: "Step 7:"
            - text: Choose from multiple payment options to proceed with the payment process.
          - listitem [level=1] [ref=e158]:
            - strong [ref=e159]: Step 8
            - text: ": After the successful payment, you will receive a confirmation of your train or bus bookings on your registered email ID or mobile number."
        - heading "Exclusive Offers on redBus" [level=2] [ref=e160]
        - paragraph [ref=e161]: redBus provides exclusive offers and deals on bus and train ticket booking for travellers. Additionally, you can also get festive offers on apps or specific to bus operators. All you need to do is check train and bus booking offers on redBus and apply the coupon code mentioned on the website or app to avail the discount. redBus keeps adding new discounts and offers depending on the seasonality, festivals, and other events.
