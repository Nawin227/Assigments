    - article [ref=e106]:
      - 'heading "redBus: India’s Leading Online Bus Booking and Train Ticket Booking Platform" [level=2] [ref=e107]'
      - generic [ref=e108]:
        - paragraph [ref=e109]: redBus is India’s leading bus and train ticket booking platform for over 18 years and 56+ million satisfied users. It offers a seamless online ticket booking experience for millions of people.
        - paragraph [ref=e110]: With 5200+ bus operators and 730000+ routes on redBus, you can easily find buses to your destination. You can check the best price with exclusive discounts and offers when booking train or bus tickets.
        - heading "Why Choose redBus for Bus Booking?" [level=2] [ref=e111]
        - paragraph [ref=e112]: Below are some of the reasons why you should choose redBus for booking bus tickets.
        - list [ref=e113]:
          - listitem [level=1] [ref=e114]:
            - strong [ref=e115]: Free Cancellation
            - text: "- Cancel bus tickets without paying cancellation charges."
          - listitem [level=1] [ref=e116]:
            - strong [ref=e117]: Flexi Ticket
            - text: "- Select a Flexi ticket to modify your travel date at least 8 hours before departure."
          - listitem [level=1] [ref=e118]:
            - strong [ref=e119]: Earn Rewards
            - text: "- Refer your friend and get INR 100 in your redBus wallet after they complete their first trip."
          - listitem [level=1] [ref=e120]:
            - strong [ref=e121]: Booking for Women
            - text: "- Access exclusive deals for women travellers, view the number of women on your bus, enjoy priority helplines, and find buses preferred by women."
          - listitem [level=1] [ref=e122]:
            - strong [ref=e123]: Primo Services
            - text: "- Select top-rated bus operators that offer timely and customer-friendly Primo services."
          - listitem [level=1] [ref=e124]:
            - strong [ref=e125]: 24/7 Customer Support
            - text: "-Receive 24/7 customer service for any assistance related to bookings."
          - listitem [level=1] [ref=e126]:
            - strong [ref=e127]: Instant Refund
            - text: "- Get an instant refund for cancellation or booking-related issues."
        - list [ref=e128]:
          - listitem [ref=e129]:
            - strong [ref=e130]: Live Bus Tracking
            - text: "- Track your bus in real-time and plan your journey more efficiently."
        - heading "Why Choose redRail for Train Ticket Booking?" [level=2] [ref=e131]
        - paragraph [ref=e132]:
          - text: Below are some of the reasons for
          - link "train ticket booking" [ref=e133] [cursor=pointer]:
